name: Global IPTV SpeedTest Engine

on:
  schedule:
    - cron: '0 */6 * * *' # 每隔 6 小时全自动运行测速清洗大洗牌一次
  workflow_dispatch:      # 支持你在 GitHub 网页后台手动点击按钮运行

jobs:
  build-and-clean:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 检出当前仓库代码
      uses: actions/checkout@v3
      with:
        fetch-depth: 1 # 👈 优化：只拉取最新一层，不要历史包袱，防仓库膨胀

    - name: 🐍 部署 Python 生产环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 安装高性能网络依赖
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp

    - name: ⚡ 运行 Python 异步测速大坝
      run: python main.py

    - name: 🚀 强力覆盖推送（彻底消灭 Git 冲突）
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 💥 关键动作：把新生成的 output/*.json 和最新的缓存库 database.json 全部强制暂存
        git add database.json output/*.json || true
        
        # 提交。如果没有数据变动，直接安全退出
        git commit -m "Update Global Pure Live Source Matrix [Automated]" || exit 0
        
        # 🔥 降维打击：放弃复杂的 rebase/merge，直接强行（-f）把虚拟机在内存里洗好的完美版本推向远程主分支！
        git push -f origin main
