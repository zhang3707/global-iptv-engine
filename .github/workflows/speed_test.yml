name: Global IPTV SpeedTest Engine

on:
  schedule:
    - cron: '0 */6 * * *' # 每隔 6 小时全自动运行测速清洗大洗牌一次
  workflow_dispatch:      # 支持你在 GitHub 网页后台手动点击按钮运行

jobs:
  build-and-clean:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 检出当前仓库代码
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 # 👈 核心优化：拉取完整的 Git 提交历史，防止浅层克隆导致合并失败

    - name: 🐍 部署 Python 生产环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 安装高性能网络依赖
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp

    - name: ⚡ 运行 Python 异步测速大坝
      run: python main.py

    - name: 🚀 将最新的纯净多国 JSON 矩阵推送到发布层
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add output/*.json
        git commit -m "Update Global Pure Live Source Matrix [Automated]" || exit 0
        # 💥 核心修复：使用 -f (force) 强行覆盖远程版本树，或者先 pull rebase 一下
        git pull --rebase origin main || true
        git push origin main
