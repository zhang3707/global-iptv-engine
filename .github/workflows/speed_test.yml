name: Global IPTV SpeedTest Engine

on:
  schedule:
    - cron: '0 */6 * * *' # 每隔 6 小时全自动运行测速清洗大洗牌一次
  workflow_dispatch:      # 支持你在 GitHub 网页后台手动点击按钮运行

jobs:
  build-and-clean:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 检出当前仓库代码
      uses: actions/checkout@v3
      with:
        fetch-depth: 1 # 👈 降维打击：只拉取最新 1 层，不加载任何历史包袱，彻底防止数据膨胀

    - name: 🐍 部署 Python 生产环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 安装高性能网络依赖
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp

    - name: ⚡ 运行 Python 异步测速大坝
      run: python main.py

    - name: 🚀 强力覆盖推送（彻底消灭 Git 冲突）
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 💥 关键动作：强制暂存新生成的 output/ 文件夹和最新的增量数据库 database.json
        git add database.json output/*.json || true
        
        # 提交。如果没有数据变动，直接安全退出
        git commit -m "Update Global Pure Live Source Matrix [Automated]" || exit 0
        
        # 🔥 终极通车：放弃容易卡死的 rebase/pull，直接强制 (-f) 把虚拟机内存里洗好的完美版本推向远程主分支！
        git push -f origin main
